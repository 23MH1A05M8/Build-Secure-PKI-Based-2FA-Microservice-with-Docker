version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: dockerfile

    ports:
      - "8080:8080"

    volumes:
      # REMOVE seed-data and cron-output (they overwrite your folders)
      - ./data:/data
      - ./cron:/cron              # cron output folder
      - ./scripts:/app/scripts    # scripts folder for cron.py
      - ./student_private.pem:/app/student_private.pem:ro
      - ./student_public.pem:/app/student_public.pem:ro
      - ./instructor_public.pem:/app/instructor_public.pem:ro

    environment:
      - TZ=UTC

    restart: unless-stopped
